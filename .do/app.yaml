# DigitalOcean App Platform Spec
# Deploy via: doctl apps create --spec .do/app.yaml
# Or connect your GitHub repo in the DO dashboard and it'll auto-detect this file.

spec:
  name: titleops
  region: nyc

  # ── Frontend (Vite static site) ──
  static_sites:
    - name: frontend
      source_dir: /
      build_command: npm install && npm run build
      output_dir: dist
      environment_slug: node-js
      routes:
        - path: /
      envs:
        - key: VITE_API_URL
          scope: BUILD_TIME
          value: ${api.PUBLIC_URL}

  # ── Backend (FastAPI) ──
  services:
    - name: api
      source_dir: /backend
      build_command: pip install -r requirements.txt
      run_command: uvicorn main:app --host 0.0.0.0 --port 8080
      environment_slug: python
      instance_size_slug: basic-xxs
      instance_count: 1
      http_port: 8080
      routes:
        - path: /api
      envs:
        - key: DEEPSEEK_API_KEY
          scope: RUN_TIME
          type: SECRET
          value: EV_VALUE_REQUIRED
        - key: PERPLEXITY_API_KEY
          scope: RUN_TIME
          type: SECRET
          value: EV_VALUE_REQUIRED
        - key: DATADOG_API_KEY
          scope: RUN_TIME
          type: SECRET
          value: EV_VALUE_REQUIRED
        - key: DATADOG_APP_KEY
          scope: RUN_TIME
          type: SECRET
          value: EV_VALUE_REQUIRED
        - key: DATADOG_SITE
          scope: RUN_TIME
          value: us5.datadoghq.com
